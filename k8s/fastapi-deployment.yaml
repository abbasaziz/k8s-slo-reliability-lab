apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: reliability-lab

spec:
  # replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "fastapi-role"
        vault.hashicorp.com/agent-inject-secret-db-config: "secret/data/db-pass"
        # This template formats the secret into a file the app can read
        vault.hashicorp.com/agent-inject-template-db-config: |
          {{- with secret "secret/data/db-pass" -}}
          export POSTGRES_USER="{{ .Data.data.user }}"
          export POSTGRES_PASSWORD="{{ .Data.data.password }}"
          {{- end -}}
    spec:
      serviceAccountName: fastapi-sa
      containers:
      - name: fastapi
        image: abbasaziz/fastapi-slo:trace-test
        command: ["/bin/sh"]
        args:
          - "-c"
          - |
            sleep 2;
            . /vault/secrets/db-config;
            # DEBUG: This will print 'testuser' to logs so we know Vault worked
            echo "Starting app with user: $POSTGRES_USER"; 
            python main.py 
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /live
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"     # 100 milli-cores (0.1 CPU)
            memory: "128Mi"
          limits:
            cpu: "500m"     # Allow bursting
            memory: "256Mi"
